<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIN Lookup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="app">

        <header class="app-header">
            <div class="header-inner">
                <div class="header-eyebrow">
                    <span class="eyebrow-dot"></span>
                    Financial Intelligence
                </div>
                <h1>BIN <span class="accent">LOOKUP</span></h1>
                <p class="header-sub">Bank Identification Number Database</p>
            </div>
            <div class="header-status">
                <div id="status-container">
                    <div class="status-msg status-loading">
                        <span class="sdot loading"></span>
                        Initializing database...
                    </div>
                </div>
            </div>
        </header>

        <main class="app-main">

            <section class="search-panel">
                <div class="tab-bar" role="tablist">
                    <button class="tab-btn active" data-tab="bin-form" role="tab" aria-selected="true">
                        <span class="tab-glyph">&#9670;</span> BIN Search
                    </button>
                    <button class="tab-btn" data-tab="keyword-form" role="tab" aria-selected="false">
                        <span class="tab-glyph">&#9670;</span> Keyword Search
                    </button>
                </div>

                <div class="tab-panels">

                    <!-- BIN Search -->
                    <div class="tab-panel active" id="bin-form" role="tabpanel">
                        <div class="search-form">
                            <div class="form-row">
                                <div class="form-group flex-grow">
                                    <label for="bin-input" class="form-label">BIN Number</label>
                                    <input type="text" class="form-control" id="bin-input"
                                        placeholder="e.g. 414720" maxlength="16" inputmode="numeric">
                                    <span class="hint">Prefix match -- finds all BINs starting with this value</span>
                                </div>
                                <div class="form-group">
                                    <label for="bin-limit" class="form-label">Limit</label>
                                    <select class="form-select" id="bin-limit">
                                        <option value="10" selected>10</option>
                                        <option value="25">25</option>
                                        <option value="50">50</option>
                                        <option value="100">100</option>
                                        <option value="all">All</option>
                                    </select>
                                </div>
                                <div class="form-group form-action">
                                    <label class="form-label">&nbsp;</label>
                                    <button class="btn-search" onclick="runBinSearch()">
                                        <span>SEARCH</span>
                                        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                            <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                                            <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Keyword Search -->
                    <div class="tab-panel" id="keyword-form" role="tabpanel">
                        <div class="search-form">
                            <div class="form-row">
                                <div class="form-group flex-grow">
                                    <label for="keyword-input" class="form-label">Keywords</label>
                                    <input type="text" class="form-control" id="keyword-input"
                                        placeholder="e.g. visa credit usa">
                                    <span class="hint">Space-separated -- searches all columns, case-insensitive</span>
                                </div>
                                <div class="form-group">
                                    <label for="keyword-limit" class="form-label">Limit</label>
                                    <select class="form-select" id="keyword-limit">
                                        <option value="10" selected>10</option>
                                        <option value="25">25</option>
                                        <option value="50">50</option>
                                        <option value="100">100</option>
                                        <option value="all">All</option>
                                    </select>
                                </div>
                                <div class="form-group form-action">
                                    <label class="form-label">&nbsp;</label>
                                    <button class="btn-search" onclick="runKeywordSearch()">
                                        <span>SEARCH</span>
                                        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                                            <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
                                            <path d="M10 10L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </section>

            <!-- Results -->
            <section id="results" class="results-panel d-none">
                <div class="results-header">
                    <h2 class="results-title" id="results-title">Results</h2>
                    <button class="btn-export" onclick="exportToCSV()">
                        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                            <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                        </svg>
                        Export CSV
                    </button>
                </div>
                <div class="table-container" id="table-output"></div>
                <div id="pagination-container" class="d-none">
                    <ul class="pagination" id="pagination"></ul>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
    <script>
        // Tab switching (replaces Bootstrap tab JS)
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('active');
                    b.setAttribute('aria-selected', 'false');
                });
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                btn.setAttribute('aria-selected', 'true');
                document.getElementById(target).classList.add('active');
            });
        });
    </script>
</body>
</html>
